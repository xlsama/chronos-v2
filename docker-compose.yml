services:
  postgres:
    image: pgvector/pgvector:pg17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: chronos
      POSTGRES_PASSWORD: chronos
      POSTGRES_DB: chronos
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chronos"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  db-push:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: build
    working_dir: /app/apps/backend
    command: pnpm db:push
    environment:
      DATABASE_URL: postgresql://chronos:chronos@postgres:5432/chronos
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: production
    env_file: apps/backend/.env
    environment:
      # Override infra URLs to use Docker service names
      DATABASE_URL: postgresql://chronos:chronos@postgres:5432/chronos
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    depends_on:
      db-push:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      target: production
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
