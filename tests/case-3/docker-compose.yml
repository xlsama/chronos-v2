services:
  case3-prometheus:
    image: prom/prometheus:v2.51.0
    container_name: case3-prometheus
    ports:
      - "39090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      case3-pushgateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  case3-pushgateway:
    image: prom/pushgateway:v1.7.0
    container_name: case3-pushgateway
    ports:
      - "39091:9091"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9091/-/healthy"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
