apiVersion: v1
kind: Namespace
metadata:
  name: chronos-case3
  labels:
    app.kubernetes.io/part-of: chronos-test

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: chronos-case3
data:
  # 故意的拼写错误: postgressql (多了一个 s) + 错误端口 54321 (应为 5432)
  DATABASE_URL: "postgressql://app_user:s3cret@db-primary.internal:54321/user_db"
  LOG_LEVEL: "info"
  MAX_CONNECTIONS: "20"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: chronos-case3
  labels:
    app: user-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              echo "Starting user-service..."
              echo "Connecting to database: $DATABASE_URL"

              # 模拟数据库连接检查
              # 解析 DATABASE_URL 中的 host 和 port
              DB_HOST=$(echo "$DATABASE_URL" | sed -n 's|.*@\(.*\):.*\/.*|\1|p')
              DB_PORT=$(echo "$DATABASE_URL" | sed -n 's|.*:\([0-9]*\)/.*|\1|p')

              echo "Attempting connection to $DB_HOST:$DB_PORT..."

              # 尝试连接（会失败，因为 host 不存在且端口错误）
              if ! nc -z -w 3 "$DB_HOST" "$DB_PORT" 2>/dev/null; then
                echo "ERROR: Cannot connect to database at $DB_HOST:$DB_PORT"
                echo "ERROR: Connection refused - check DATABASE_URL configuration"
                echo "DATABASE_URL=$DATABASE_URL"
                exit 1
              fi

              echo "Connected successfully, starting application..."
              # 不会到达这里
              sleep infinity
          envFrom:
            - configMapRef:
                name: app-config
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: chronos-case3
spec:
  selector:
    app: user-service
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
