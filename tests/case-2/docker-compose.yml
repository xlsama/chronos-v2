services:
  postgres:
    image: postgres:16-alpine
    container_name: case2-postgres
    environment:
      POSTGRES_USER: prod
      POSTGRES_PASSWORD: prod123
      POSTGRES_DB: platform_logs
    ports:
      - "25432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prod -d platform_logs"]
      interval: 2s
      timeout: 3s
      retries: 10

  mysql:
    image: mysql:8.0
    container_name: case2-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_USER: payment
      MYSQL_PASSWORD: payment123
      MYSQL_DATABASE: payment_db
    ports:
      - "23306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      interval: 3s
      timeout: 5s
      retries: 15

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: case2-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
    ports:
      - "29200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: case2-redis
    ports:
      - "26379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10
