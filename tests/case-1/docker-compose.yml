services:
  postgres:
    image: postgres:16-alpine
    container_name: case1-postgres
    environment:
      POSTGRES_USER: prod
      POSTGRES_PASSWORD: prod123
      POSTGRES_DB: order_service
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prod -d order_service"]
      interval: 2s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: case1-redis
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10
